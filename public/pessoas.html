<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pessoa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilo.css" />
    <link rel="stylesheet" href="css/tabela.css" />
    <link rel="stylesheet" href="css/cadastro.css" />
  </head>
  <body>
    <!--Cabeçalho-->
    <nav class="navbar navbar-expand-lg bg-dark">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="lista">
            <li class="nav-item">
              <a class="nav-link" href="index.html"> Pessoa</a>
            </li>
          </ul>
          <a class="btn btn-outline-danger" href="index.html" role="button"
            >Sair</a
          >
        </div>
      </div>
    </nav>
    <!--Fim do Cabeçalho-->

    <!-- Modal de Cadastro/Editar Pessoa -->
    <div id="vis-modal" class="modal">
      <div class="box" style="margin-top: 150px">
        <img
          src="img/botao-x.png"
          alt="Fechar"
          id="btn-fechar"
          onclick="fecharModal('vis-modal')"
        />
        <form id="classForm">
          <fieldset>
            <legend><b>Cadastro de Pessoa</b></legend>

            <div class="label-float">
              <input
                type="text"
                name="title"
                id="title"
                class="inputUser"
                placeholder=" "
                required
              />
              <label for="title" class="labelInput">Nome</label>
            </div>
            <br />

            <div class="label-float">
              <input
                type="text"
                name="title"
                id="title"
                class="inputUser"
                placeholder=" "
                required
              />
              <label for="title" class="labelInput">CPF</label>
            </div>
            <br />

            <div class="label-float">
              <input
                type="date"
                name="nascimento"
                id="nascimento"
                class="inputUser"
                required
              />
              <label for="nascimento" class="labelInput"
                >Data de Nascimento</label
              >
            </div>
            <br />
            <div class="label-float">
              <input
                type="tel"
                name="telefone"
                id="telefone"
                class="inputUser"
                placeholder=" "
                onkeyup="handlePhone(event)"
                maxlength="15"
                required
              />
              <label for="telefone" class="labelInput"
                >Telefone / WhatsApp</label
              >
            </div>
          </fieldset>
          <br />
          <br />
          <br />
          <button type="submit" id="submit">Cadastrar</button>
        </form>
      </div>
    </div>

    <!-- Corpo -->
    <main>
      <div class="header-pag">
        <h1 class="titulo-pag">Pessoa</h1>
        <a href="#" class="btn-new" onclick="abrirModal('vis-modal')"
          >Criar Novo</a
        >
      </div>
      <hr />

      <div class="container">
        <!-- Tabela -->
        <table class="table text-white table-bg mt-4">
          <thead class="bg-primary">
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Nascimento</th>
              <th>Telefone</th>
              <th>...</th>
            </tr>
          </thead>
          <tbody id="classList"></tbody>
        </table>
      </div>
    </main>

    <script src="js/modal.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
