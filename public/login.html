<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/cadastro_login.css" />
  </head>
  <body>
    <!-- Modal de Cadastro/Editar Pessoa -->
    <div id="vis-modal" class="modal">
      <div class="box" style="margin-top: 150px">
        <img
          src="img/botao-x.png"
          alt="Fechar"
          id="btn-fechar"
          onclick="fecharModal('vis-modal')"
        />
        <form id="classForm">
          <fieldset>
            <legend><b>Cadastro de Pessoa</b></legend>

            <div class="label-float">
              <input
                type="text"
                name="title"
                id="nome"
                class="inputUser"
                placeholder=" "
                required
              />
              <label for="title" class="labelInput">Nome</label>
            </div>
            <br />
            <div class="label-float">
              <input
                type="text"
                name="title"
                id="login"
                class="inputUser"
                placeholder=" "
                required
              />
              <label for="title" class="labelInput">Login</label>
            </div>
            <br />
            <div class="label-float">
              <input
                type="password"
                name="title"
                id="senha"
                class="inputUser"
                placeholder=" "
                required
              />
              <label for="title" class="labelInput">Senha</label>
            </div>
            <br />
          </fieldset>
          <br />
          <br />
          <br />
          <button type="submit" id="submit">Cadastrar</button>
        </form>
      </div>
    </div>

    <div
      class="login-area d-flex flex-column align-items-center justify-content-center text-center"
      style="background-color: rgba(0, 0, 0, 0.9); color: white"
    >
      <h1>Login</h1>
      <hr style="width: 60%; color: white" />
      <div class="inputs mt-4">
        <form id="loginForm" style="width: 300px">
          <input
            type="text"
            name="name"
            id="name"
            required
            class="form-control mb-3"
            placeholder="Usuário"
            style="padding: 5%"
          />
          <input
            type="password"
            name="password"
            id="password"
            required
            class="form-control mb-3"
            placeholder="Senha"
          />
          <input
            type="submit"
            value="Entrar"
            id="btn-entrar"
            class="btn btn-primary w-100"
          />
          <br />
          <br />
          <a
            href="#"
            id="btn-entrar"
            class="btn btn-primary w-100"
            onclick="abrirModal('vis-modal')"
            >Cadastrar</a
          >
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  <script src="js/modal.js"></script>
  <script src="js/app.js"></script>
</html>
